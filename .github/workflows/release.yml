name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to re-deploy (e.g. v0.2.0). Leave blank when triggered from a push."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  release-please:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  deploy:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Validate tag input
        run: |
          if [ -z "$TAG" ]; then
            echo "::error::No tag available. For workflow_dispatch runs, supply the 'tag' input."
            exit 1
          fi
          echo "Deploying tag: $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Write release metadata
        run: |
          cat > dist/metadata.json <<EOF
          {
            "version": "${TAG}",
            "sha": "${{ github.sha }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "nodeVersion": "$(node --version)"
          }
          EOF

      - name: Archive dist
        run: tar -czf "dist-${TAG}.tar.gz" -C dist .

      - name: Attach build artifact to release
        run: gh release upload "$TAG" "dist-${TAG}.tar.gz" --clobber --repo "$GITHUB_REPOSITORY"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v5
