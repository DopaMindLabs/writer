name: Deploy from tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v0.4.2)"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Write build metadata
        run: |
          cat > dist/metadata.json <<EOF
          {
            "version": "${TAG}",
            "sha": "${{ github.sha }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "nodeVersion": "$(node --version)"
          }
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
